<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>動画メモ</title>
<style>
:root { --bg:#fff; --text:#202020; --muted:#6a6a6a; --accent:#0066cc; --border:#e0e0e0; }
@media (prefers-color-scheme: dark) {
  :root { --bg:#1a1a1a; --text:#e4e4e4; --muted:#9a9a9a; --accent:#4a9eff; --border:#3a3a3a; }
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
  background: var(--bg); color: var(--text);
  line-height: 1.75; margin: 0; padding: 24px 18px; font-size: 16px;
}
.container { max-width: 720px; margin: 0 auto; }
h1 { font-size: 24px; margin: 12px 0 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
a { color: var(--accent); word-break: break-all; }
.meta { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
</style>
</head>
<body>
<div class="container">
<h1>動画メモ</h1>
<p class="meta">保存: 2026-05-07</p>
<p><a href="https://youtu.be/RVTfBs0IhhI?si=EroEKwFdH2DTTH2X">https://youtu.be/RVTfBs0IhhI?si=EroEKwFdH2DTTH2X</a></p>
</div>
</body>
</html>
